<script>
/* =========================================================
   DATI ORIGINALI (immutabili)
========================================================= */
const ORIGINAL = [
  null,
  { league: 8,  modifier: false, subtitle: 'Divisione Budget MAX consigliata',
    data: [{l:'ATTACCO',p:60},{l:'CENTROCAMPO',p:27},{l:'DIFESA',p:8},{l:'PORTA',p:5}] },
  { league: 8,  modifier: true,  subtitle: 'Divisione Budget MAX consigliata',
    data: [{l:'ATTACCO',p:56.3},{l:'CENTROCAMPO',p:24.3},{l:'DIFESA',p:12.6},{l:'PORTA',p:6.8}] },
  { league: 10, modifier: false, subtitle: 'Divisione Budget consigliata',
    data: [{l:'ATTACCO',p:57.4},{l:'CENTROCAMPO',p:24.8},{l:'PORTA',p:8.9},{l:'DIFESA',p:8.9}] },
  { league: 10, modifier: true,  subtitle: 'Divisione Budget MAX consigliata',
    data: [{l:'ATTACCO',p:54.3},{l:'CENTROCAMPO',p:20.7},{l:'DIFESA',p:14.1},{l:'PORTA',p:10.9}] },
  { league: 12, modifier: false, subtitle: 'Divisione Budget MAX consigliata',
    data: [{l:'ATTACCO',p:56.7},{l:'CENTROCAMPO',p:25.8},{l:'PORTA',p:9.3},{l:'DIFESA',p:8.2}] },
  { league: 12, modifier: true,  subtitle: 'Divisione Budget MAX consigliata',
    data: [{l:'ATTACCO',p:55},{l:'CENTROCAMPO',p:18},{l:'DIFESA',p:16},{l:'PORTA',p:11}] },
];

/* Stato mutabile — una copia per ogni slide */
const state = ORIGINAL.map(s => s
  ? { ...s, data: s.data.map(d => ({ ...d })) }
  : null
);

const COLORS = {
  ATTACCO:     '#b0ff00',
  CENTROCAMPO: '#3b82f6',
  DIFESA:      '#f59e0b',
  PORTA:       '#ef4444',
};
const BG    = '#0d0d0d';
const TOTAL = state.length;
let current = 0;

/* =========================================================
   REDISTRIBUZIONE DINAMICA
   Quando cambia la slice i, le altre si riscalano per mantenere 100%
========================================================= */
function redistribute(data, changedIdx, newPct) {
  newPct = Math.min(98, Math.max(1, newPct));
  const oldPct  = data[changedIdx].p;
  const oldRem  = 100 - oldPct;
  const newRem  = 100 - newPct;

  const result = data.map((d, i) => {
    if (i === changedIdx) return { ...d, p: newPct };
    const adj = oldRem > 0 ? d.p * newRem / oldRem : newRem / (data.length - 1);
    return { ...d, p: Math.max(0.1, adj) };
  });

  /* normalizza a 100 esatto */
  const sum = result.reduce((s, d) => s + d.p, 0);
  const f   = 100 / sum;
  return result.map(d => ({ ...d, p: d.p * f }));
}

/* =========================================================
   RENDER PIE SVG
========================================================= */
function toRad(deg) { return (deg - 90) * Math.PI / 180; }

function slicePath(cx, cy, r, a1, a2) {
  const x1 = cx + r * Math.cos(toRad(a1));
  const y1 = cy + r * Math.sin(toRad(a1));
  const x2 = cx + r * Math.cos(toRad(a2));
  const y2 = cy + r * Math.sin(toRad(a2));
  const lg = (a2 - a1) > 180 ? 1 : 0;
  return `M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${lg} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`;
}

const DEFS = `<defs>
  <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
    <feGaussianBlur stdDeviation="7" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>`;

function buildPie(data, cx, cy, r, slideIdx) {
  let svg = '';
  let angle = 0;

  const slices = data.map((d, i) => {
    const sweep = d.p / 100 * 360;
    const end   = angle + sweep;
    const mid   = angle + sweep / 2;
    const s     = { d, i, sweep, start: angle, end, mid };
    angle = end;
    return s;
  });

  /* fette */
  slices.forEach(s => {
    const color = COLORS[s.d.l] || '#555';
    const glow  = s.d.l === 'ATTACCO' ? ' filter="url(#glow)"' : '';
    svg += `<path d="${slicePath(cx, cy, r, s.start, s.end)}" fill="${color}" stroke="${BG}" stroke-width="4"${glow}/>`;
  });

  /* etichette */
  slices.forEach(s => {
    const labelR = s.d.p < 12 ? r + 88 : r + 62;
    const lx = cx + labelR * Math.cos(toRad(s.mid));
    const ly = cy + labelR * Math.sin(toRad(s.mid));

    /* linea connettore */
    const cx1 = cx + (r + 7)       * Math.cos(toRad(s.mid));
    const cy1 = cy + (r + 7)       * Math.sin(toRad(s.mid));
    const cx2 = cx + (labelR - 20) * Math.cos(toRad(s.mid));
    const cy2 = cy + (labelR - 20) * Math.sin(toRad(s.mid));
    svg += `<line x1="${cx1.toFixed(1)}" y1="${cy1.toFixed(1)}" x2="${cx2.toFixed(1)}" y2="${cy2.toFixed(1)}" stroke="#444" stroke-width="1.5"/>`;

    const cos    = Math.cos(toRad(s.mid));
    const anchor = cos > 0.15 ? 'start' : cos < -0.15 ? 'end' : 'middle';
    const pct    = s.d.p % 1 < 0.05 ? Math.round(s.d.p) + '%' : s.d.p.toFixed(1) + '%';
    const col    = COLORS[s.d.l] || '#fff';

    /* nome reparto */
    svg += `<text x="${lx.toFixed(1)}" y="${(ly - 3).toFixed(1)}" text-anchor="${anchor}"
      font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="900" fill="#ddd">${s.d.l}</text>`;

    /* percentuale — CLICCABILE per modificare */
    svg += `<text x="${lx.toFixed(1)}" y="${(ly + 22).toFixed(1)}" text-anchor="${anchor}"
      font-family="Arial Black, Arial, sans-serif" font-size="23" font-weight="900" fill="${col}"
      style="cursor:pointer" onclick="startEdit(event,${slideIdx},${s.i})"
      title="Clicca per modificare">${pct}</text>`;
  });

  return svg;
}

/* =========================================================
   RE-RENDER singola slide (dopo modifica)
========================================================= */
function renderChartSlide(idx) {
  const sd  = state[idx];
  const el  = document.getElementById(`slide-${idx}`);
  const svg = el.querySelector('.c-chart');
  svg.innerHTML = DEFS + buildPie(sd.data, 440, 290, 195, idx);
}

/* =========================================================
   COSTRUZIONE SLIDE AL CARICAMENTO
========================================================= */
const wrapper = document.getElementById('wrapper');

for (let i = 1; i < state.length; i++) {
  const sd  = state[i];
  const div = document.createElement('div');
  div.className = 'slide';
  div.id = `slide-${i}`;

  const modLine = sd.modifier
    ? '<span class="neon">CON MODIFICATORE</span>'
    : 'SENZA MODIFICATORE';

  div.innerHTML = `
    <div class="slide-header">
      <div class="ch-league">ASTA A ${sd.league}</div>
      <div class="ch-modifier">${modLine}</div>
      <div class="ch-sub">${sd.subtitle}</div>
    </div>
    <img class="c-avatar" src="avatar.png" alt="" onerror="this.style.display='none'">
    <svg class="c-chart" viewBox="0 0 920 580" xmlns="http://www.w3.org/2000/svg">
      ${DEFS}${buildPie(sd.data, 440, 290, 195, i)}
    </svg>
  `;
  /* inserisci PRIMA dell'overlay, non dopo */
  wrapper.insertBefore(div, document.getElementById('edit-overlay'));
}

/* =========================================================
   MODIFICA BUDGET DINAMICO
========================================================= */
let editSlide = null;
let editItem  = null;

function startEdit(event, sIdx, dIdx) {
  event.stopPropagation();
  editSlide = sIdx;
  editItem  = dIdx;

  const d       = state[sIdx].data[dIdx];
  const input   = document.getElementById('edit-input');
  const label   = document.getElementById('edit-label');
  const overlay = document.getElementById('edit-overlay');

  label.textContent = d.l + ':';
  input.value = parseFloat(d.p.toFixed(1));

  const wRect = wrapper.getBoundingClientRect();
  let ox = event.clientX - wRect.left - 50;
  let oy = event.clientY - wRect.top  - 25;
  ox = Math.max(10, Math.min(ox, 1100));
  oy = Math.max(10, Math.min(oy, 660));

  overlay.style.left    = ox + 'px';
  overlay.style.top     = oy + 'px';
  overlay.style.display = 'flex';
  setTimeout(() => { input.focus(); input.select(); }, 30);
}

function commitEdit() {
  if (editSlide === null) return;
  const val = parseFloat(document.getElementById('edit-input').value);
  if (!isNaN(val) && val >= 1 && val <= 98) {
    state[editSlide].data = redistribute(state[editSlide].data, editItem, val);
    renderChartSlide(editSlide);
  }
  closeEdit();
}

function closeEdit() {
  document.getElementById('edit-overlay').style.display = 'none';
  editSlide = null;
  editItem  = null;
}

function handleEditKey(event) {
  if (event.key === 'Enter')  { event.preventDefault(); commitEdit(); }
  if (event.key === 'Escape') { event.preventDefault(); closeEdit();  }
}
/* applica handler correttamente (sovrascrive l'attr inline) */
document.getElementById('edit-input').onkeydown = handleEditKey;

/* click fuori dall'overlay → conferma */
document.addEventListener('click', (e) => {
  const overlay = document.getElementById('edit-overlay');
  if (editSlide !== null && overlay.style.display !== 'none' && !overlay.contains(e.target)) {
    commitEdit();
  }
});

/* =========================================================
   RESET valori originali della slide corrente
========================================================= */
function resetSlide() {
  if (current === 0) return;
  const orig = ORIGINAL[current];
  state[current].data = orig.data.map(d => ({ ...d }));
  renderChartSlide(current);
}

/* =========================================================
   NAVIGAZIONE
========================================================= */
const dotsEl = document.getElementById('dots');
for (let i = 0; i < TOTAL; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' on' : '');
  d.onclick = () => show(i);
  dotsEl.appendChild(d);
}

function show(n) {
  closeEdit();
  document.getElementById(`slide-${current}`).classList.remove('active');
  dotsEl.children[current].classList.remove('on');
  current = ((n % TOTAL) + TOTAL) % TOTAL;
  document.getElementById(`slide-${current}`).classList.add('active');
  dotsEl.children[current].classList.add('on');
  document.getElementById('nctr').textContent = `${current + 1} / ${TOTAL}`;
}

function go(dir) { show(current + dir); }

document.addEventListener('keydown', e => {
  if (editSlide !== null) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

/* =========================================================
   RESPONSIVE SCALING
   ≤768px  → CSS reflow (gestito da media query)
   769–1319px → CSS transform scale sul wrapper
   ≥1320px → dimensioni native 1280×720
========================================================= */
function scaleCards() {
  const vw      = window.innerWidth;
  const wrap    = document.getElementById('wrapper');
  const slides  = document.querySelectorAll('.slide');
  if (vw <= 768) {
    slides.forEach(s => { s.style.transform = ''; s.style.transformOrigin = ''; });
    wrap.style.width = '';
    wrap.style.height = '';
    return;
  }
  const available = vw - 32;
  if (available < 1280) {
    const scale = available / 1280;
    slides.forEach(s => {
      s.style.transform = `scale(${scale})`;
      s.style.transformOrigin = 'top left';
    });
    wrap.style.width  = available + 'px';
    wrap.style.height = (720 * scale) + 'px';
    wrap.style.overflow = 'hidden';
  } else {
    slides.forEach(s => { s.style.transform = ''; s.style.transformOrigin = ''; });
    wrap.style.width  = '';
    wrap.style.height = '';
    wrap.style.overflow = '';
  }
}
window.addEventListener('resize', scaleCards);
scaleCards();

/* =========================================================
   PUBBLICA SU GITHUB
   Cartella: "materiali per l'asta"  →  repo: fabmiscia/Il-Mister-Fabry
   Il token viene chiesto una sola volta e salvato nel localStorage
   (non finisce mai nel codice pubblicato)
========================================================= */
const GH_REPO = 'fabmiscia/Il-Mister-Fabry';
const GH_PATH = "01 Materiali per l'asta/fantacalcio-budget-asta.html";

function getExportHTML() {
  /* serializza lo stato corrente (budget eventualmente modificati)
     e lo inietta come ORIGINAL nel file da pubblicare */
  const snap = JSON.stringify(state.map(s => s
    ? { ...s, data: s.data.map(d => ({ l: d.l, p: Math.round(d.p * 10) / 10 })) }
    : null
  ));
  return document.documentElement.outerHTML
    .replace(/const ORIGINAL = \[[\s\S]*?\n\];/, `const ORIGINAL = ${snap};`);
}

async function publishToGitHub() {
  /* recupera o chiede il token (salvato nel browser, mai nel sorgente) */
  let token = localStorage.getItem('gh_pat');
  if (!token) {
    token = prompt(
      'Inserisci il tuo GitHub Personal Access Token.\n' +
      '(Viene salvato solo nel tuo browser — non nel file pubblicato.)'
    );
    if (!token) return;
    localStorage.setItem('gh_pat', token.trim());
  }
  token = token.trim();

  const btn      = document.getElementById('gh-btn');
  const origHTML = btn.innerHTML;
  btn.innerHTML  = '⏳ Pubblicazione…';
  btn.disabled   = true;

  try {
    const encodedPath = GH_PATH.split('/').map(encodeURIComponent).join('/');
    const apiUrl  = `https://api.github.com/repos/${GH_REPO}/contents/${encodedPath}`;
    const hdrs    = {
      'Authorization': `token ${token}`,
      'Accept':        'application/vnd.github.v3+json',
      'Content-Type':  'application/json'
    };

    /* verifica se il file esiste già → serve il SHA per aggiornarlo */
    let sha = null;
    const check = await fetch(apiUrl, { headers: hdrs });
    if (check.ok) sha = (await check.json()).sha;

    /* base64 del contenuto HTML con stato budget corrente */
    const content = btoa(unescape(encodeURIComponent(getExportHTML())));

    const res = await fetch(apiUrl, {
      method:  'PUT',
      headers: hdrs,
      body: JSON.stringify({
        message: sha ? 'Aggiorna budget asta fantacalcio' : 'Aggiunge budget asta fantacalcio',
        content,
        ...(sha ? { sha } : {})
      })
    });

    if (res.ok) {
      btn.innerHTML          = '✅ Pubblicato!';
      btn.style.background   = '#166534';
      btn.style.borderColor  = '#22c55e';
      setTimeout(() => {
        btn.innerHTML         = origHTML;
        btn.style.background  = '';
        btn.style.borderColor = '';
        btn.disabled          = false;
      }, 3000);
    } else {
      const err = await res.json();
      throw new Error(err.message || 'Errore sconosciuto');
    }
  } catch (e) {
    btn.innerHTML          = '❌ Errore';
    btn.style.background   = '#7f1d1d';
    btn.style.borderColor  = '#ef4444';
    alert('Errore pubblicazione GitHub:\n' + e.message +
          (e.message.includes('credentials') ? '\n\nToken non valido — verrà rimosso.' : ''));
    if (e.message?.includes('credentials') || e.message?.includes('401')) {
      localStorage.removeItem('gh_pat');
    }
    setTimeout(() => {
      btn.innerHTML         = origHTML;
      btn.style.background  = '';
      btn.style.borderColor = '';
      btn.disabled          = false;
    }, 3000);
  }
}

async function exportPNG() {
  closeEdit();
  const el = document.getElementById(`slide-${current}`);
  const canvas = await html2canvas(el, {
    scale: 2,
    useCORS: true,
    backgroundColor: BG,
    width: 1280,
    height: 720,
  });
  const a = document.createElement('a');
  a.download = `budget-asta-${current === 0 ? 'cover' : 'slide-' + current}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// ── Salva in locale ──────────────────────────
async function salvaInLocale() {
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const blob = new Blob([html], {type: 'text/html'});
  const fname = location.pathname.split('/').pop() || document.title.replace(/[^a-z0-9_\-]/gi,'_') + '.html';
  try {
    if (window.showSaveFilePicker) {
      const handle = await window.showSaveFilePicker({
        suggestedName: fname,
        types: [{description:'HTML', accept:{'text/html':['.html']}}]
      });
      const w = await handle.createWritable();
      await w.write(blob);
      await w.close();
      const btn = document.getElementById('btn-salva-locale');
      if (btn) { const orig = btn.textContent; btn.textContent = '✅ Salvato!'; setTimeout(()=>btn.textContent=orig,2000); }
    } else { throw new Error('no picker'); }
  } catch(e) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    a.click();
  }
}
