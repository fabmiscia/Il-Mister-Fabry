<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuovi Arrivi Fantacalcio 2026-27 — Il Mister Fabry</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; font-family:'Montserrat',sans-serif; min-height:100vh; color:#fff; }

.header {
  background:linear-gradient(180deg,#111 0%,#0a0a0a 100%);
  border-bottom:1px solid #1a1a1a;
  padding:28px 24px 22px;
  text-align:center;
  position:relative;
}
.header-back {
  position:absolute; left:20px; top:50%; transform:translateY(-50%);
  color:#2DB84A; font-size:11px; letter-spacing:2px;
  text-decoration:none; text-transform:uppercase; font-weight:700;
}
.header-back:hover { color:#fff; }
.header-title {
  font-family:'Oswald',sans-serif;
  font-size:26px; letter-spacing:5px; text-transform:uppercase;
}
.header-title span { color:#2DB84A; }
.header-sub { color:#444; font-size:10px; letter-spacing:3px; text-transform:uppercase; margin-top:5px; }

#breadcrumb {
  max-width:1100px; margin:0 auto;
  padding:18px 24px 0;
  display:none; align-items:center; gap:8px;
}
#breadcrumb button {
  background:none; border:none; color:#2DB84A;
  font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700;
  letter-spacing:1px; cursor:pointer; text-transform:uppercase; padding:0;
}
#breadcrumb button:hover { color:#fff; }
#breadcrumb .sep { color:#333; }
#breadcrumb .current { color:#666; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1px; }

.count-bar {
  max-width:1100px; margin:0 auto;
  padding:20px 24px 4px;
  color:#333; font-size:10px; letter-spacing:3px; text-transform:uppercase;
}

.page { max-width:1100px; margin:0 auto; padding:16px 24px 80px; }

/* ── GRID SQUADRE — 3 colonne fisse ── */
.squadre-grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:20px;
}

.squadra-card {
  background:#111;
  border:2px solid rgba(255,255,255,.07);
  border-radius:14px;
  padding:28px 16px 22px;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:12px;
  transition:border-color .2s, box-shadow .2s, transform .15s;
  border-top:3px solid var(--tc, #2DB84A);
}
.squadra-card:hover {
  border-color:var(--tc, #2DB84A);
  box-shadow:0 0 30px rgba(0,0,0,.6);
  transform:translateY(-4px);
}

.logo-wrap {
  width:72px; height:72px;
  display:flex; align-items:center; justify-content:center;
}
.logo-wrap img {
  width:72px; height:72px;
  object-fit:contain;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));
}

.squadra-nome {
  font-family:'Oswald',sans-serif;
  font-size:18px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; text-align:center;
}
.squadra-count {
  background:rgba(255,255,255,.07);
  border-radius:20px; padding:4px 14px;
  font-size:10px; font-weight:700; letter-spacing:1.5px;
  color:var(--tc, #2DB84A); text-transform:uppercase;
}

/* ── GRID GIOCATORI ── */
.giocatori-header {
  display:flex; align-items:center; gap:18px; margin-bottom:28px;
}
.giocatori-header img {
  width:60px; height:60px; object-fit:contain;
  filter:drop-shadow(0 2px 10px rgba(0,0,0,.6));
}
.squadra-title-big {
  font-family:'Oswald',sans-serif;
  font-size:28px; letter-spacing:4px; text-transform:uppercase;
}
.squadra-title-big span { color:var(--tc, #2DB84A); }

.giocatori-grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:16px;
}
.giocatore-card {
  background:#111; border:2px solid rgba(255,255,255,.07);
  border-radius:12px; padding:22px 18px;
  display:flex; flex-direction:column; gap:8px;
  text-decoration:none; color:#fff;
  transition:border-color .2s, box-shadow .2s, transform .15s;
  border-top:3px solid var(--tc, #2DB84A);
}
.giocatore-card:hover {
  border-color:var(--tc, #2DB84A);
  box-shadow:0 0 20px rgba(0,0,0,.5);
  transform:translateY(-3px);
}
.giocatore-nome {
  font-family:'Oswald',sans-serif;
  font-size:17px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
}
.giocatore-sub { font-size:10px; color:#555; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
.giocatore-arrow { color:var(--tc, #2DB84A); font-size:12px; font-weight:800; margin-top:4px; }

.loader { text-align:center; padding:60px 0; color:#333; font-size:11px; letter-spacing:3px; text-transform:uppercase; }

/* ── IFRAME VIEW ── */
#view-iframe {
  display:none;
  position:fixed; inset:0; z-index:100;
  flex-direction:column;
  background:#0a0a0a;
}
#view-iframe .iframe-bar {
  display:flex; align-items:center; gap:14px;
  padding:10px 20px;
  background:#111; border-bottom:1px solid #1a1a1a;
  flex-shrink:0;
}
#view-iframe .iframe-bar button {
  background:none; border:none; color:#2DB84A;
  font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700;
  letter-spacing:1px; cursor:pointer; text-transform:uppercase; padding:0;
}
#view-iframe .iframe-bar button:hover { color:#fff; }
#view-iframe .iframe-bar .iframe-title {
  color:#555; font-size:12px; font-weight:600;
  letter-spacing:1px; text-transform:uppercase;
}
#scheda-iframe {
  flex:1; border:none; width:100%; height:100%;
}

@media(max-width:700px){
  .squadre-grid, .giocatori-grid { grid-template-columns: 1fr 1fr; gap:12px; }
}
@media(max-width:420px){
  .squadre-grid, .giocatori-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <a class="header-back" href="../index.html">← Home</a>
  <div class="header-title">NUOVI ARRIVI <span>FANTACALCIO</span></div>
  <div class="header-sub">Serie A 2026-27 &bull; Schede giocatori</div>
</div>

<div id="breadcrumb">
  <button onclick="tornaSquadre()">← Tutte le squadre</button>
  <span class="sep">/</span>
  <span class="current" id="breadcrumb-nome"></span>
</div>

<div class="count-bar" id="count-bar"></div>

<div class="page" id="page-content">
  <div class="loader">Caricamento squadre…</div>
</div>

<!-- Scheda giocatore inline -->
<div id="view-iframe">
  <div class="iframe-bar">
    <button onclick="chiudiScheda()">← Torna alla lista</button>
    <span class="iframe-title" id="iframe-title"></span>
  </div>
  <iframe id="scheda-iframe" src="about:blank" allowfullscreen></iframe>
</div>

<script>
const REPO    = 'fabmiscia/Il-Mister-Fabry';
const FOLDER  = 'Nuovi arrivi Fantacalcio';
const BASE_URL = 'https://fabmiscia.github.io/Il-Mister-Fabry/' + FOLDER + '/';
const LOGHI   = 'https://fabmiscia.github.io/Il-Mister-Fabry/loghi/';

const TEAM_INFO = {
  'atalanta':   { color:'#1c5ba6', logo:'atalanta.png' },
  'bologna':    { color:'#cc0000', logo:'bologna.png' },
  'cagliari':   { color:'#cc0000', logo:'cagliari.png' },
  'como':       { color:'#0033cc', logo:'como.png' },
  'fiorentina': { color:'#6600cc', logo:'fiorentina.png' },
  'frosinone':  { color:'#ffcc00', logo:'frosinone.png' },
  'genoa':      { color:'#cc0000', logo:'genoa.png' },
  'inter':      { color:'#003399', logo:'inter.png' },
  'internazionale': { color:'#003399', logo:'inter.png' },
  'juventus':   { color:'#e0e0e0', logo:'juventus.png' },
  'lazio':      { color:'#87ceeb', logo:'lazio.png' },
  'lecce':      { color:'#ffcc00', logo:'lecce.png' },
  'milan':      { color:'#e8003d', logo:'milan.png' },
  'monza':      { color:'#cc0000', logo:'monza.png' },
  'napoli':     { color:'#0066cc', logo:'napoli.png' },
  'parma':      { color:'#ffdd00', logo:'parma.png' },
  'roma':       { color:'#e30613', logo:'roma.png' },
  'sassuolo':   { color:'#00aa44', logo:'sassuolo.png' },
  'torino':     { color:'#8b0000', logo:'torino.png' },
  'udinese':    { color:'#cccccc', logo:'udinese.png' },
  'venezia':    { color:'#ff6600', logo:'venezia.png' },
};

function getTeamInfo(nome) {
  const k = nome.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,'');
  for (const [key, info] of Object.entries(TEAM_INFO)) {
    if (k.includes(key) || key.includes(k)) return info;
  }
  return { color:'#2DB84A', logo:null };
}

function parseName(filename) {
  const base = filename.replace('nuovo_arrivo_','').replace('.html','');
  const parts = base.split('__');
  return {
    giocatore: parts[0].replace(/_/g,' ').trim(),
    squadra:   parts[1] ? parts[1].replace(/_/g,' ').trim() : 'Altro'
  };
}

let squadreMap = {};

async function loadFiles() {
  try {
    const r = await fetch('https://raw.githubusercontent.com/' + REPO + '/main/' + encodeURIComponent(FOLDER) + '/giocatori.json');
    const giocatori = await r.json();
    squadreMap = {};
    for (const g of giocatori) {
      if (!squadreMap[g.squadra]) squadreMap[g.squadra] = [];
      squadreMap[g.squadra].push({ giocatore: g.giocatore, file: g.file });
    }
    renderSquadre();
  } catch(e) {
    document.getElementById('page-content').innerHTML = '<div class="loader">Errore caricamento. Riprova tra qualche minuto.</div>';
  }
}

function renderSquadre() {
  document.getElementById('breadcrumb').style.display = 'none';
  const squadre = Object.keys(squadreMap).sort();
  const totG = Object.values(squadreMap).reduce((s,a)=>s+a.length,0);
  document.getElementById('count-bar').textContent =
    squadre.length + ' squadr' + (squadre.length===1?'a':'e') + ' · ' + totG + ' giocator' + (totG===1?'e':'i');

  const html = squadre.map(sq => {
    const info = getTeamInfo(sq);
    const n = squadreMap[sq].length;
    const imgTag = info.logo
      ? '<img src="' + LOGHI + info.logo + '" alt="' + sq + '" width="72" height="72" style="object-fit:contain">'
      : '';
    return '<div class="squadra-card" style="--tc:' + info.color + '" onclick="openSquadra(\'' + sq.replace(/'/g,"\\'") + '\')">'
      + '<div class="logo-wrap">' + imgTag + '</div>'
      + '<div class="squadra-nome">' + sq + '</div>'
      + '<div class="squadra-count">' + n + ' giocator' + (n===1?'e':'i') + '</div>'
      + '</div>';
  }).join('');

  document.getElementById('page-content').innerHTML = '<div class="squadre-grid">' + html + '</div>';
}

function openSquadra(squadra) {
  const info = getTeamInfo(squadra);
  const giocatori = squadreMap[squadra] || [];

  document.getElementById('breadcrumb').style.display = 'flex';
  document.getElementById('breadcrumb-nome').textContent = squadra;
  document.getElementById('count-bar').textContent =
    giocatori.length + ' giocator' + (giocatori.length===1?'e':'i') + ' arrivat' + (giocatori.length===1?'o':'i') + ' al ' + squadra;

  const imgHeader = info.logo
    ? '<img src="' + LOGHI + info.logo + '" alt="' + squadra + '" width="60" height="60" style="object-fit:contain">'
    : '';

  const words = squadra.toUpperCase().split(' ');
  const titleHTML = '<span>' + words[0] + '</span>' + (words.length > 1 ? ' ' + words.slice(1).join(' ') : '');

  const cards = giocatori.map(g =>
    '<div class="giocatore-card" style="--tc:' + info.color + '" onclick="apriScheda(\'' + encodeURIComponent(g.file) + '\',\'' + g.giocatore.replace(/'/g,"\\'") + '\')">'
    + '<div class="giocatore-nome">' + g.giocatore + '</div>'
    + '<div class="giocatore-sub">→ ' + squadra + '</div>'
    + '<div class="giocatore-arrow">Apri scheda →</div>'
    + '</div>'
  ).join('');

  document.getElementById('page-content').innerHTML =
    '<div class="giocatori-header" style="--tc:' + info.color + '">'
    + imgHeader
    + '<div class="squadra-title-big" style="--tc:' + info.color + '">' + titleHTML + '</div>'
    + '</div>'
    + '<div class="giocatori-grid">' + cards + '</div>';

  window.scrollTo({top:0, behavior:'smooth'});
}

function tornaSquadre() { renderSquadre(); }

function apriScheda(encodedFile, nomeGiocatore) {
  const url = BASE_URL + encodedFile;
  document.getElementById('iframe-title').textContent = nomeGiocatore;
  document.getElementById('scheda-iframe').src = url;
  document.getElementById('view-iframe').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function chiudiScheda() {
  document.getElementById('view-iframe').style.display = 'none';
  document.getElementById('scheda-iframe').src = 'about:blank';
  document.body.style.overflow = '';
}

loadFiles();
</script>

<div id="_pwa_nav" style="position:fixed;bottom:20px;right:16px;z-index:99999;display:flex;flex-direction:column;gap:8px"><button onclick="history.back()" aria-label="Indietro" title="Indietro" style="width:46px;height:46px;border-radius:50%;background:rgba(17,17,17,.92);border:1px solid #2a2a2a;color:#fff;font-size:22px;cursor:pointer;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,.5)">&#x2190;</button><button onclick="history.forward()" aria-label="Avanti" title="Avanti" style="width:46px;height:46px;border-radius:50%;background:rgba(17,17,17,.92);border:1px solid #2a2a2a;color:#fff;font-size:22px;cursor:pointer;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,.5)">&#x2192;</button></div>
</body>
</html>
