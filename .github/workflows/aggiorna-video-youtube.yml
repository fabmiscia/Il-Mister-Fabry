name: Aggiorna video YouTube

on:
  schedule:
    - cron: '0 * * * *'   # ogni ora
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch video YouTube e aggiorna videos.json + tappe
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, os, re
          from xml.etree import ElementTree as ET
          from datetime import datetime

          CHANNEL_ID = 'UCuUdaz_njw3-fmeY-Xlv2jw'
          rss_url = f'https://www.youtube.com/feeds/videos.xml?channel_id={CHANNEL_ID}'
          req = urllib.request.Request(rss_url, headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req) as r:
              xml_text = r.read()

          root = ET.fromstring(xml_text)
          ns = {'atom': 'http://www.w3.org/2005/Atom', 'yt': 'http://www.youtube.com/xml/schemas/2015'}
          videos = []
          for entry in root.findall('atom:entry', ns):
              title   = entry.find('atom:title', ns).text or ''
              link    = entry.find('atom:link', ns).get('href','')
              pub     = entry.find('atom:published', ns).text or ''
              vid_el  = entry.find('yt:videoId', ns)
              videoId = vid_el.text if vid_el is not None else ''
              if videoId:
                  videos.append({'title': title, 'link': link, 'published': pub[:10], 'videoId': videoId})
          print(f"Trovati {len(videos)} video")

          # Aggiorna videos.json
          out_path = "02 Il cammino verso l'asta/videos.json"
          existing = []
          if os.path.exists(out_path):
              with open(out_path) as f:
                  existing = json.load(f)
          videos_changed = {v['videoId'] for v in existing} != {v['videoId'] for v in videos}
          if videos_changed:
              with open(out_path, 'w', encoding='utf-8') as f:
                  json.dump(videos, f, ensure_ascii=False, indent=2)
              print("Salvato videos.json")

          # Aggiorna le tappe
          TAPPE_PATH = "03 Le tappe verso l'asta/le-tappe-verso-lasta.html"
          TAPPA_RANGES = [
              {'start': '2026-07-01', 'end': '2026-07-10'},
              {'start': '2026-07-11', 'end': '2026-07-22'},
              {'start': '2026-07-23', 'end': '2026-07-31'},
              {'start': '2026-08-01', 'end': '2026-08-07'},
              {'start': '2026-08-08', 'end': '2026-08-20'},
              {'start': '2026-08-21', 'end': '2026-08-21'},
          ]
          MESI = {'January':'Gennaio','February':'Febbraio','March':'Marzo','April':'Aprile',
                  'May':'Maggio','June':'Giugno','July':'Luglio','August':'Agosto',
                  'September':'Settembre','October':'Ottobre','November':'Novembre','December':'Dicembre'}

          def tappa_idx(pub):
              try:
                  d = datetime.strptime(pub, '%Y-%m-%d')
              except:
                  return -1
              for i, t in enumerate(TAPPA_RANGES):
                  if datetime.strptime(t['start'],'%Y-%m-%d') <= d <= datetime.strptime(t['end'],'%Y-%m-%d'):
                      return i
              return -1

          def fmt_date(pub):
              d = datetime.strptime(pub, '%Y-%m-%d')
              s = d.strftime('%-d %B %Y')
              for en, it in MESI.items():
                  s = s.replace(en, it)
              return s

          tappe_changed = False
          if os.path.exists(TAPPE_PATH):
              with open(TAPPE_PATH, 'r', encoding='utf-8') as f:
                  html = f.read()
              ms = '/* <<DEFAULT_TAPPE_START>> */'
              me = '/* <<DEFAULT_TAPPE_END>> */'
              idx_s = html.find(ms)
              idx_e = html.find(me) + len(me)
              if idx_s != -1:
                  block = html[idx_s:idx_e]
                  m = re.search(r'const DEFAULT_TAPPE = (\[[\s\S]*?\]);', block)
                  if m:
                      tappe = json.loads(m.group(1))
                      existing_urls = {v['url'] for t in tappe for v in t.get('video',[])}
                      for v in videos:
                          if v['link'] in existing_urls:
                              continue
                          ti = tappa_idx(v['published'])
                          if ti == -1:
                              continue
                          tappe[ti]['video'].append({'titolo': v['title'], 'data': fmt_date(v['published']), 'url': v['link'], 'top': False})
                          existing_urls.add(v['link'])
                          tappe_changed = True
                          print(f"  + Tappa {ti+1}: {v['title'][:60]}")
                      if tappe_changed:
                          new_block = f"{ms}\nconst DEFAULT_TAPPE = {json.dumps(tappe, ensure_ascii=False, indent=2)};\n{me}"
                          html = html[:idx_s] + new_block + html[idx_e:]
                          with open(TAPPE_PATH, 'w', encoding='utf-8') as f:
                              f.write(html)
                          print("Salvato le-tappe-verso-lasta.html")
                      else:
                          print("Nessun nuovo video per le tappe")

          if videos_changed or tappe_changed:
              env_file = os.environ.get('GITHUB_ENV','')
              if env_file:
                  with open(env_file,'a') as ef:
                      ef.write('VIDEOS_CHANGED=true\n')
          PYEOF

      - name: Commit e push se ci sono nuovi video
        if: env.VIDEOS_CHANGED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "02 Il cammino verso l'asta/videos.json"
          git add "03 Le tappe verso l'asta/le-tappe-verso-lasta.html"
          git commit -m "Aggiorna video YouTube $(date +'%Y-%m-%d %H:%M')"
          git push
