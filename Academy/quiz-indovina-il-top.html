<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Come Indovinare il Top d'Attacco al Fantacalcio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #060b14;
    color: #fff;
    font-family: 'Impact', 'Arial Black', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 50%, rgba(180,0,0,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 40%, rgba(0,40,120,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 3s infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.8; }
  }

  /* ===== HEADER ===== */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    text-align: center;
    padding: 18px 20px 10px;
    z-index: 10;
  }

  .header-title {
    font-size: clamp(18px, 3vw, 28px);
    color: #fff;
    letter-spacing: 1px;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .header-title span {
    color: #e01010;
  }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap {
    position: fixed;
    top: 72px; left: 0; right: 0;
    padding: 0 40px;
    z-index: 10;
  }
  .progress-bar-bg {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #e01010, #ff5500);
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .progress-label {
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-top: 6px;
    font-family: Arial, sans-serif;
    font-weight: bold;
    letter-spacing: 2px;
  }

  /* ===== MAIN CARD ===== */
  .card-container {
    width: 100%;
    max-width: 760px;
    padding: 20px;
    margin-top: 30px;
  }

  .question-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 44px 48px 40px;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #e01010, #ff5500, #e01010);
    background-size: 200% 100%;
    animation: shimmer 2s linear infinite;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .question-number {
    font-size: 13px;
    color: #e01010;
    letter-spacing: 3px;
    margin-bottom: 16px;
    font-family: Arial, sans-serif;
  }

  .question-icon {
    font-size: 48px;
    margin-bottom: 20px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(224,16,16,0.4));
  }

  .question-text {
    font-size: clamp(22px, 4vw, 36px);
    color: #fff;
    line-height: 1.2;
    margin-bottom: 40px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    outline: none;
  }

  .hint-text {
    font-size: 15px;
    color: #fff;
    font-family: Arial, sans-serif;
    font-weight: normal;
    margin-top: 12px;
    margin-bottom: 20px;
    text-transform: none;
    letter-spacing: 0;
    line-height: 1.5;
  }

  /* ===== LEGEND ===== */
  .legend {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: bold;
    color: #fff;
    white-space: nowrap;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ===== BUTTONS ===== */
  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 10px;
  }

  .btn {
    padding: 22px 0;
    border: none;
    border-radius: 14px;
    font-size: 32px;
    font-family: 'Impact', 'Arial Black', Arial, sans-serif;
    font-weight: 900;
    cursor: pointer;
    letter-spacing: 3px;
    transition: transform 0.12s, box-shadow 0.12s, opacity 0.12s;
    position: relative;
    overflow: hidden;
    text-transform: uppercase;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
  }

  .btn:hover::after { background: rgba(255,255,255,0.08); }
  .btn:active { transform: scale(0.97); }

  .btn-si {
    background: linear-gradient(145deg, #1a8c1a, #0d6e0d);
    color: #fff;
    box-shadow: 0 4px 20px rgba(26,140,26,0.4);
  }
  .btn-si:hover {
    box-shadow: 0 6px 28px rgba(26,140,26,0.6);
    transform: translateY(-2px);
  }

  .btn-no {
    background: linear-gradient(145deg, #c01010, #8a0a0a);
    color: #fff;
    box-shadow: 0 4px 20px rgba(192,16,16,0.4);
  }
  .btn-no:hover {
    box-shadow: 0 6px 28px rgba(192,16,16,0.6);
    transform: translateY(-2px);
  }

  /* ===== ANSWER FLASH ===== */
  .answer-reveal {
    display: none;
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 10px;
    font-family: Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    font-style: italic;
  }
  .answer-reveal.show { display: block; }
  .answer-reveal.positive { background: rgba(26,140,26,0.15); border-left: 4px solid #1a8c1a; color: #7fff7f; }
  .answer-reveal.negative { background: rgba(192,16,16,0.15); border-left: 4px solid #c01010; color: #ff9f9f; }
  .answer-reveal.neutral  { background: rgba(255,180,0,0.15); border-left: 4px solid #ffb400; color: #ffe090; }

  /* ===== RESULT SCREEN ===== */
  .result-screen {
    display: none;
    text-align: center;
    padding: 50px 40px;
  }

  .result-emoji {
    font-size: 80px;
    display: block;
    margin-bottom: 24px;
    animation: pop 0.5s cubic-bezier(.36,.07,.19,.97);
  }

  @keyframes pop {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-score {
    font-size: 72px;
    color: #e01010;
    line-height: 1;
    margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(224,16,16,0.5);
  }

  .result-score-label {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    font-family: Arial, sans-serif;
    margin-bottom: 28px;
    letter-spacing: 2px;
  }

  .result-title {
    font-size: clamp(24px, 5vw, 44px);
    text-transform: uppercase;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  .result-subtitle {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    font-family: Arial, sans-serif;
    line-height: 1.6;
    max-width: 480px;
    margin: 0 auto 36px;
  }

  .score-bar-wrap {
    max-width: 400px;
    margin: 0 auto 36px;
  }

  .score-bar-bg {
    height: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 1.2s cubic-bezier(.4,0,.2,1) 0.3s;
  }

  .score-segments {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    font-family: Arial, sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
  }

  .btn-restart {
    background: linear-gradient(145deg, #e01010, #a00000);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px 48px;
    font-size: 20px;
    font-family: 'Impact', Arial, sans-serif;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 20px rgba(224,16,16,0.4);
    margin-top: 8px;
  }
  .btn-restart:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(224,16,16,0.6);
  }

  /* Slide transition */
  .slide-out-left {
    animation: slideOutLeft 0.3s cubic-bezier(.4,0,.2,1) forwards;
  }
  .slide-in-right {
    animation: slideInRight 0.35s cubic-bezier(.4,0,.2,1) forwards;
  }

  @keyframes slideOutLeft {
    to { transform: translateX(-60px); opacity: 0; }
  }
  @keyframes slideInRight {
    from { transform: translateX(60px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* Export buttons */
  .export-bar {
    position: fixed;
    bottom: 16px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 100;
  }
  .export-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.6);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: Arial, sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .export-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- Header -->
<header class="header">
  <div class="header-title" contenteditable="true">Come Indovinare il <span>Top d'Attacco</span> al Fantacalcio</div>
</header>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">DOMANDA 1 DI 10</div>
</div>

<!-- Quiz Card -->
<div class="card-container">
  <div class="question-card" id="quizCard">
    <div class="question-number" id="qNumber">DOMANDA 1 / 10</div>
    <span class="question-icon" id="qIcon">⚽</span>
    <div class="question-text" id="qText" contenteditable="true">Ha il contratto in scadenza?</div>
    <div class="hint-text" id="qHint" contenteditable="true"></div>

    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#1a8c1a"></span>8–10 = INSERIRE TRA GLI OBIETTIVI</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ffb400"></span>5–7 = SOLO SE DIVENTA UN AFFARE</div>
      <div class="legend-item"><span class="legend-dot" style="background:#c01010"></span>0–4 = EVITARE</div>
    </div>

    <div class="buttons">
      <button class="btn btn-si" onclick="answer(true)">SÌ</button>
      <button class="btn btn-no" onclick="answer(false)">NO</button>
    </div>
    <div class="answer-reveal" id="answerReveal"></div>
  </div>

  <!-- Result Screen -->
  <div class="question-card result-screen" id="resultScreen">
    <span class="result-emoji" id="resultEmoji">🏆</span>
    <div class="result-score" id="resultScore">0</div>
    <div class="result-score-label">PUNTI SU 10</div>
    <div class="result-title" id="resultTitle">VALUTAZIONE</div>
    <div class="result-subtitle" id="resultSubtitle"></div>
    <div class="score-bar-wrap">
      <div class="score-bar-bg">
        <div class="score-bar-fill" id="scoreBarFill" style="width:0%"></div>
      </div>
      <div class="score-segments">
        <span>RISCHIO ALTO</span>
        <span style="text-align:center">DA MONITORARE</span>
        <span style="text-align:right">TOP!</span>
      </div>
    </div>
    <button class="btn-restart" onclick="restart()">RIFAI IL QUIZ</button>
  </div>
</div>

<!-- Export -->
<div class="export-bar">
  <button class="export-btn" onclick="exportPNG()">Esporta PNG</button>
  <button class="export-btn" onclick="exportGH()">Esporta su GitHub</button>
</div>

<script>
const questions = [
  {
    icon: "📄",
    text: "Ha il contratto in scadenza?",
    hint: "Un giocatore in scadenza potrebbe essere meno motivato o in uscita",
    siPositive: false,
    siMsg: "Attenzione — potrebbe avere la testa altrove o partire a zero.",
    noMsg: "Bene! Contratto blindato, nessuna distrazione di mercato."
  },
  {
    icon: "👑",
    text: "È titolarissimo?",
    hint: "Gioca ogni settimana dal primo minuto?",
    siPositive: true,
    siMsg: "Ottimo! La titolarità garantisce minuti e bonus costanti.",
    noMsg: "Rischio! Meno minuti = meno bonus. Meglio cercare altrove."
  },
  {
    icon: "💪",
    text: "È integro fisicamente?",
    hint: "Parte dalla prossima stagione al 100% della forma",
    siPositive: true,
    siMsg: "Perfetto! Un attaccante in forma è già metà del lavoro.",
    noMsg: "Problema. Se parte con acciacchi, i bonus scarseggiano."
  },
  {
    icon: "🩹",
    text: "Soffre di infortuni frequenti?",
    hint: "Nella sua carriera ha saltato molte partite per infortuni?",
    siPositive: false,
    siMsg: "Segnale rosso. Infortuni frequenti = tanti gettoni sprecati.",
    noMsg: "Bene! Giocatore solido, non sparirà per mesi."
  },
  {
    icon: "🎯",
    text: "Gioca nella sua posizione preferita?",
    hint: "Il suo ruolo tattico corrisponde alle sue caratteristiche naturali?",
    siPositive: true,
    siMsg: "Ottimo! Nella sua posizione rende il massimo e produce più bonus.",
    noMsg: "Attenzione. Fuori ruolo, il rendimento fantacalcistico cala."
  },
  {
    icon: "⚡",
    text: "Gioca in una squadra che fa calcio offensivo?",
    hint: "La squadra segna molto e crea tante occasioni?",
    siPositive: true,
    siMsg: "Top! Più la squadra attacca, più lui ha chance di bonus.",
    noMsg: "Rischio. In un sistema difensivo i gol scarseggiano."
  },
  {
    icon: "📈",
    text: "È un giocatore costante come rendimento?",
    hint: "Produce bonus in modo regolare durante tutta la stagione?",
    siPositive: true,
    siMsg: "Oro puro. La costanza vale più dei picchi isolati.",
    noMsg: "Altalenante. Magari spacca, ma ti fa soffrire troppo."
  },
  {
    icon: "⚽",
    text: "Ha uno storico gol in Serie A da meritare di essere classificato top?",
    hint: "Ha già dimostrato di saper segnare in Serie A?",
    siPositive: true,
    siMsg: "Storico che parla chiaro. Chi ha già fatto gol tende a rifarli.",
    noMsg: "Incognita. Senza storico Serie A, è una scommessa."
  },
  {
    icon: "🤝",
    text: "Ha uno storico con lo stesso allenatore in Serie A?",
    hint: "Ha già lavorato con questo allenatore? Sa come sfruttarlo?",
    siPositive: true,
    siMsg: "Ottimo! L'allenatore lo conosce: ruolo e fiducia già consolidati.",
    noMsg: "Da valutare. Tempo di adattamento che può costare bonus."
  },
  {
    icon: "🔥",
    text: "Avrà parecchio hype alle aste?",
    hint: "Sarà conteso e farà salire il prezzo in modo esagerato?",
    siPositive: false,
    siMsg: "Occhio! Con tanto hype rischi di pagarlo troppo. Strategia fondamentale.",
    noMsg: "Bene! Meno hype = puoi prenderlo a prezzo giusto senza guerre."
  }
];

let current = 0;
let score = 0;
let revealing = false;

function answer(isSi) {
  if (revealing) return;
  revealing = true;

  const q = questions[current];
  const isPositive = (isSi === q.siPositive);
  if (isPositive) score++;

  const reveal = document.getElementById('answerReveal');
  reveal.textContent = isSi ? q.siMsg : q.noMsg;
  reveal.className = 'answer-reveal show ' + (isPositive ? 'positive' : (isSi !== q.siPositive ? 'negative' : 'neutral'));

  // Disable buttons
  document.querySelectorAll('.btn').forEach(b => b.style.opacity = '0.4');

  setTimeout(() => {
    current++;
    if (current >= questions.length) {
      showResult();
    } else {
      transitionToNext();
    }
    revealing = false;
  }, 1000);
}

function transitionToNext() {
  const card = document.getElementById('quizCard');
  card.classList.add('slide-out-left');
  setTimeout(() => {
    loadQuestion(current);
    card.classList.remove('slide-out-left');
    card.classList.add('slide-in-right');
    setTimeout(() => card.classList.remove('slide-in-right'), 350);
  }, 300);
}

function loadQuestion(idx) {
  const q = questions[idx];
  document.getElementById('qNumber').textContent = `DOMANDA ${idx+1} / ${questions.length}`;
  document.getElementById('qIcon').textContent = q.icon;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('qHint').textContent = q.hint;
  document.getElementById('answerReveal').className = 'answer-reveal';
  document.querySelectorAll('.btn').forEach(b => b.style.opacity = '1');

  const pct = (idx / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `DOMANDA ${idx+1} DI ${questions.length}`;
}

function showResult() {
  document.getElementById('quizCard').style.display = 'none';
  const rs = document.getElementById('resultScreen');
  rs.style.display = 'block';
  rs.classList.add('slide-in-right');

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = 'QUIZ COMPLETATO';

  setTimeout(() => {
    document.getElementById('resultScore').textContent = score;
    const pct = score / questions.length;
    const fill = document.getElementById('scoreBarFill');

    let color, emoji, title, subtitle;
    if (score >= 8) {
      color = '#1a8c1a';
      emoji = '🎯';
      title = 'INSERIRE TRA GLI OBIETTIVI';
      subtitle = 'Tutti i segnali sono verdi. Mettilo in cima alla lista e punta su di lui all\'asta: ha tutto per essere il tuo top d\'attacco.';
    } else if (score >= 5) {
      color = '#ffb400';
      emoji = '🤝';
      title = 'SOLO SE DIVENTA UN AFFARE';
      subtitle = 'Ha del potenziale, ma ci sono variabili da valutare. Prendilo solo se riesci a strapparlo a un prezzo vantaggioso.';
    } else {
      color = '#c01010';
      emoji = '🚫';
      title = 'EVITARE';
      subtitle = 'Troppi segnali negativi. Lascialo agli altri e investi i crediti su un attaccante più solido e affidabile.';
    }

    fill.style.width = (score * 10) + '%';
    fill.style.background = `linear-gradient(90deg, #c01010, ${color})`;
    document.getElementById('resultEmoji').textContent = emoji;
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultTitle').style.color = color;
    document.getElementById('resultSubtitle').textContent = subtitle;
  }, 400);
}

function restart() {
  current = 0;
  score = 0;
  revealing = false;
  document.getElementById('resultScreen').style.display = 'none';
  const card = document.getElementById('quizCard');
  card.style.display = 'block';
  loadQuestion(0);
  card.classList.add('slide-in-right');
  setTimeout(() => card.classList.remove('slide-in-right'), 350);
}

// Stars background
(function() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      animation-delay:${Math.random()*3}s;
      animation-duration:${2+Math.random()*3}s;
    `;
    container.appendChild(s);
  }
})();

// Init
loadQuestion(0);

// Export PNG
function exportPNG() {
  alert('Per esportare PNG: usa la funzione "Stampa" del browser → Salva come PDF, oppure fai uno screenshot.');
}

// Export GitHub
function exportGH() {
  alert('Funzione GitHub non configurata per questo file.');
}
</script>
</body>
</html>
